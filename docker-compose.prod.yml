version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - CARGO_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - PREVIEW_CORS_ORIGIN=${PREVIEW_CORS_ORIGIN}
    depends_on:
      - redis
    networks:
      - backend
    deploy:
      update_config:
        order: start-first

volumes:
  redis_data:

networks:
  backend:

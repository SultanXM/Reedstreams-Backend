version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - CARGO_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_SECRET=changeme123
      - CORS_ORIGIN=*
      - PREVIEW_CORS_ORIGIN=*
    depends_on:
      - redis

volumes:
  redis_data:
